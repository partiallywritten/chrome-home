<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <link rel="icon" type="image/svg+xml" href="assets/nozy.svg" />
    <link rel="stylesheet" href="css/style.min.css" />
  </head>
  <body>
    <div id="background-layer" class="background-layer" aria-hidden="true"></div>
    <video id="background-video" class="background-video bg-disabled" aria-hidden="true" autoplay loop muted playsinline></video>
    <!-- Main content -->
    <main class="container">
      <section class="clock-section">
        <time id="time" class="time"></time>
        <p id="date" class="date"></p>
      </section>

      <section class="search-section">
        <form id="search-form" class="search-form" role="search">
          <div class="search-bar">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input
              type="search"
              name="q"
              id="search-input"
              class="search-input"
              placeholder="Search Web"
              autocomplete="off"
              aria-label="Search Web"
            />
            <button type="submit" class="search-submit" aria-label="Submit search">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </button>
          </div>
        </form>
      </section>

      <section id="favorites-section" class="favorites-section">
        <div id="favorites-grid" class="favorites-grid"></div>
        <button id="add-btn" class="add-btn" title="Add favorite site" aria-label="Add favorite site">+</button>
      </section>
    </main>

    <!-- Settings toggle -->
    <button id="settings-btn" class="settings-btn" title="Settings" aria-label="Open settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>

    <!-- Settings panel -->
    <aside id="settings-panel" class="settings-panel" aria-hidden="true">
      <div class="settings-header">
        <div class="settings-header__row1">
          <div class="settings-header__title">
            <h2 id="settings-branding">Nozy-NT</h2>
            <span id="settings-version" class="settings-version">(v1.0.0)</span>
          </div>
          <button id="close-settings" class="icon-btn" title="Close" aria-label="Close settings">&times;</button>
        </div>
        <div class="settings-header__row2">
          <div class="settings-header__socials">
            <a id="github-link" class="icon-btn" href="https://github.com/partiallywritten/Nozy-NT" target="_blank" rel="noopener noreferrer" title="Nozy-NT on GitHub" aria-label="View NozyNT on GitHub">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
                <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.744 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
              </svg>
            </a>
          </div>
          <span class="settings-header__sep" aria-hidden="true">|</span>
          <input type="file" id="import-theme-file" accept=".zip" class="hidden" aria-hidden="true" />
          <button id="import-theme-btn" class="icon-btn" title="Import theme from zip" aria-label="Import theme from zip">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
          </button>
          <button id="export-theme-btn" class="icon-btn export-theme-btn hidden" title="Export theme settings" aria-label="Export theme settings as zip">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </button>
        </div>
        <div id="update-notice" class="settings-update-notice hidden" aria-live="polite">New update: <span id="update-version"></span></div>
      </div>
      <div class="settings-body">
        <details class="settings-section">
          <summary>General</summary>
          <div class="settings-section-content">
            <div class="setting-group">
              <label for="tab-name">Tab Name</label>
              <div class="input-row">
                <input
                  type="text"
                  id="tab-name"
                  class="text-input"
                  placeholder="New Tab"
                  maxlength="60"
                />
                <button id="apply-tab-name" class="btn">Apply</button>
              </div>
            </div>
            <div class="setting-group">
              <div class="label-row">
                <label for="favicon-url">Favicon URL</label>
                <button id="clear-favicon" class="btn-inline-reset">reset</button>
              </div>
              <div class="input-row">
                <input
                  type="url"
                  id="favicon-url"
                  class="text-input"
                  placeholder="https://example.com/icon.png"
                  aria-describedby="favicon-url-error"
                />
                <button id="apply-favicon" class="btn">Apply</button>
              </div>
              <div class="input-row">
                <input type="file" id="favicon-file" class="text-input file-input" accept="image/*" />
              </div>
              <span id="favicon-url-error" class="field-error" aria-live="polite"></span>
            </div>
          </div>
        </details>

        <details class="settings-section">
          <summary>Favorites</summary>
          <div class="settings-section-content">
            <div class="setting-group">
              <div class="toggle-row">
                <span class="setting-group-label">Show Favorites</span>
                <label class="toggle-switch">
                  <input type="checkbox" id="favorites-enabled-toggle" checked />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
            <div class="setting-group">
              <div class="toggle-row">
                <span class="setting-group-label">Show Add Button</span>
                <label class="toggle-switch">
                  <input type="checkbox" id="favorites-show-add-toggle" checked />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
            <div class="setting-group">
              <div class="input-row">
                <label for="favorites-layout-select" class="setting-inline-label">Layout</label>
                <select id="favorites-layout-select" class="text-input">
                  <option value="row">Row</option>
                  <option value="column">Column</option>
                </select>
              </div>
            </div>
            <div class="setting-group">
              <label for="favorites-x">Favorites Position: horizontal</label>
              <input type="range" id="favorites-x" min="-150" max="150" step="5" value="0" />
            </div>
            <div class="setting-group">
              <label for="favorites-y">Favorites Position: vertical</label>
              <input type="range" id="favorites-y" min="-150" max="150" step="5" value="0" />
            </div>
          </div>
        </details>

        <details class="settings-section">
          <summary>Search</summary>
          <div class="settings-section-content">
            <div class="setting-group">
              <div class="label-row">
                <label for="search-url">Search URL</label>
                <button id="clear-search-url" class="btn-inline-reset">reset</button>
              </div>
              <div class="input-row">
                <input
                  type="text"
                  id="search-url"
                  class="text-input"
                  placeholder="https://www.google.com/search?q={query}"
                  aria-describedby="search-url-error"
                />
                <button id="apply-search-url" class="btn">Apply</button>
              </div>
              <span id="search-url-error" class="field-error" aria-live="polite"></span>
            </div>
            <div class="setting-group">
              <label for="search-width">Search Bar Width (px)</label>
              <input type="range" id="search-width" min="100" max="900" step="10" value="560" />
            </div>
            <div class="setting-group">
              <label for="search-x">Search Bar Position: horizontal</label>
              <input type="range" id="search-x" min="-150" max="150" step="5" value="0" />
            </div>
            <div class="setting-group">
              <label for="search-y">Search Bar Position: vertical</label>
              <input type="range" id="search-y" min="-150" max="150" step="5" value="0" />
            </div>
          </div>
        </details>

        <details class="settings-section">
          <summary>Background</summary>
          <div class="settings-section-content">
            <div class="setting-group">
              <div class="toggle-row">
                <span class="setting-group-label">Enable Background</span>
                <label class="toggle-switch">
                  <input type="checkbox" id="bg-image-toggle" checked />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
            <div class="setting-group">
              <label for="bg-brightness">Background Brightness</label>
              <input type="range" id="bg-brightness" min="-100" max="100" step="1" value="0" />
            </div>
            <div class="setting-group">
              <label for="bg-image-cap">Background Quality Cap</label>
              <select id="bg-image-cap" class="text-input">
                <option value="default">Default (no scaling)</option>
                <option value="1080p">1080p (1920×1080)</option>
                <option value="1440p">1440p (2560×1440)</option>
                <option value="4K">4K (3840×2160)</option>
              </select>
            </div>
            <div class="setting-group">
              <div class="input-row">
                <label for="bg-file-size-cap" class="setting-inline-label">File size <span class="setting-hint">(max 250 MB)</span></label>
                <input
                  type="number"
                  id="bg-file-size-cap"
                  class="text-input size-cap-input"
                  min="1"
                  max="250"
                  step="1"
                  value="50"
                  aria-label="Max file size in MB"
                />
                <span class="size-cap-unit">MB</span>
              </div>
            </div>
            <div class="setting-group">
              <div class="label-row">
                <label for="bg-image">Background Source</label>
                <button id="clear-bg" class="btn-inline-reset">clear</button>
              </div>
              <div class="input-row">
                <input
                  type="url"
                  id="bg-image"
                  class="text-input"
                  placeholder="https://example.com/photo.jpg"
                  aria-describedby="bg-image-error"
                />
                <button id="apply-bg" class="btn">Apply</button>
              </div>
              <div class="input-row">
                <input type="file" id="bg-file" class="text-input file-input" accept="image/*,video/mp4,video/webm" />
              </div>
              <span id="bg-image-error" class="field-error" aria-live="polite"></span>
            </div>
          </div>
        </details>

        <details class="settings-section">
          <summary>Theme</summary>
          <div class="settings-section-content">
            <div class="setting-group">
              <div class="toggle-row">
                <span class="setting-group-label">Enable Theme Browser</span>
                <label class="toggle-switch">
                  <input type="checkbox" id="themes-enabled-toggle" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
            <div class="setting-group color-group">
              <label for="bg-color">Background Color</label>
              <div class="color-control">
                <input type="text" id="bg-color-hex" class="hex-input" value="#003056" maxlength="7" spellcheck="false" aria-label="Background Color hex value" />
                <input type="color" id="bg-color" class="color-picker color-swatch" value="#003056" aria-label="Background Color picker" />
              </div>
            </div>
            <div class="setting-group color-group">
              <label for="surface-color">Element Background Color</label>
              <div class="color-control">
                <input type="text" id="surface-color-hex" class="hex-input" value="#003056" maxlength="7" spellcheck="false" aria-label="Element Background Color hex value" />
                <input type="color" id="surface-color" class="color-picker color-swatch" value="#003056" aria-label="Element Background Color picker" />
              </div>
            </div>
            <div class="setting-group color-group">
              <label for="highlight-color">Highlight Color</label>
              <div class="color-control">
                <input type="text" id="highlight-color-hex" class="hex-input" value="#be9da8" maxlength="7" spellcheck="false" aria-label="Highlight Color hex value" />
                <input type="color" id="highlight-color" class="color-picker color-swatch" value="#be9da8" aria-label="Highlight Color picker" />
              </div>
            </div>
            <div class="setting-group color-group">
              <label for="text-color">Text Color</label>
              <div class="color-control">
                <input type="text" id="text-color-hex" class="hex-input" value="#eeb8b7" maxlength="7" spellcheck="false" aria-label="Text Color hex value" />
                <input type="color" id="text-color" class="color-picker color-swatch" value="#eeb8b7" aria-label="Text Color picker" />
              </div>
            </div>
          </div>
        </details>

        <details class="settings-section">
          <summary>Clock</summary>
          <div class="settings-section-content">
            <div class="setting-group">
              <div class="toggle-row">
                <span class="setting-group-label">Hide Clock</span>
                <label class="toggle-switch">
                  <input type="checkbox" id="clock-hidden-toggle" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
            <div class="setting-group">
              <div class="toggle-row">
                <span class="setting-group-label">Hide Date</span>
                <label class="toggle-switch">
                  <input type="checkbox" id="date-hidden-toggle" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
            <div class="setting-group">
              <label for="clock-size">Clock Size</label>
              <input type="range" id="clock-size" min="2" max="14" step="0.2" value="8" />
            </div>
            <div class="setting-group">
              <label for="clock-x">Clock Position: horizontal</label>
              <input type="range" id="clock-x" min="-300" max="300" step="5" value="0" />
            </div>
            <div class="setting-group">
              <label for="clock-y">Clock Position: vertical</label>
              <input type="range" id="clock-y" min="-300" max="300" step="5" value="0" />
            </div>
          </div>
        </details>

        <details class="settings-section">
          <summary>Font</summary>
          <div class="settings-section-content">
            <div class="setting-group">
              <label for="font-url">Font Stylesheet URL</label>
              <input
                type="url"
                id="font-url"
                class="text-input"
                placeholder="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap"
                aria-describedby="font-url-error"
              />
              <span id="font-url-error" class="field-error" aria-live="polite"></span>
            </div>
            <div class="setting-group">
              <label for="font-family">Font Family</label>
              <input
                type="text"
                id="font-family"
                class="text-input"
                placeholder="'JetBrains Mono', monospace"
              />
            </div>
            <button id="apply-font" class="btn">Apply Font</button>
          </div>
        </details>
      </div>
      <div class="settings-footer">
        <button id="browse-themes-btn" class="btn btn-ghost browse-themes-btn hidden">Browse Themes</button>
        <button id="restore-defaults" class="btn btn-restore">Restore Defaults</button>
      </div>
    </aside>

    <!-- Themes overlay (inside settings panel visually, separate node for z-index) -->
    <div id="themes-overlay" class="themes-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="themes-overlay-title" aria-hidden="true">
      <div class="themes-overlay__header">
        <h3 id="themes-overlay-title">Browse Themes</h3>
        <button id="close-themes-btn" class="icon-btn" title="Close" aria-label="Close theme browser">&times;</button>
      </div>
      <div class="themes-overlay__body">
        <div class="themes-overlay__options">
          <div class="toggle-row">
            <span class="setting-group-label">Enable Community Themes</span>
            <label class="toggle-switch">
              <input type="checkbox" id="community-themes-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <p id="themes-status" class="themes-status"></p>
        <div id="themes-grid" class="themes-grid"></div>
      </div>
    </div>

    <!-- Add / Edit favorite modal -->
    <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal">
        <h3 id="modal-title">Add Favorite</h3>
        <div class="form-group">
          <label for="fav-name">Name</label>
          <input type="text" id="fav-name" class="text-input" placeholder="Google" maxlength="30" aria-describedby="fav-name-error" />
          <span id="fav-name-error" class="field-error" aria-live="polite"></span>
        </div>
        <div class="form-group">
          <label for="fav-url">URL</label>
          <input type="url" id="fav-url" class="text-input" placeholder="https://google.com" aria-describedby="fav-url-error" />
          <span id="fav-url-error" class="field-error" aria-live="polite"></span>
        </div>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
          <button id="modal-save" class="btn">Save</button>
        </div>
      </div>
    </div>

    <script src="js/usables.js"></script>
    <script src="js/defaults.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/theme_api.js"></script>
  </body>
</html>
